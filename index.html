<body></body>
<script src="https://cdn.jsdelivr.net/gh/netizenorg/netnet-standard-library/build/nn.min.js"></script>
<script>
  /* global nn */

  function draw () {
    if (nn.mouseDown) {
    let x = nn.mouseX
    let y = nn.mouseY
    let hue = nn.random(360)

    nn.create('img')
      .set('src', 'https://web.archive.org/web/20090830033151if_/http://geocities.com/TimesSquare/6582/images/axfish.gif')
      .css('user-select', 'none')
      .hueRotate(hue)
      .position(x, y)
      .scale(1)
      .rotate(hue)
      .addTo('body')
  }
}
  
  
  function teleportDraw () {
    let x = nn.random(nn.width)
    let y = nn.random(nn.height)
    let hue = nn.random(360)
    
    nn.create('img')
      .set('src', 'https://web.archive.org/web/20091026174619im_/http://geocities.com/NapaValley/5559/cata.gif')
      .css('user-select', 'none')
      .hueRotate(hue)
      .position(x, y)
      .scale(2)
      .rotate(hue)
      .addTo('body')
    
  }
  

  
  /*nn.times(500, draw)*/
  
  nn.on('mousemove', draw)
  nn.on('mouseup', teleportDraw)
  //setInterval(teleportDraw, 1000)
  
</script>
